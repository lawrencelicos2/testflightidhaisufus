<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>1glwfs</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    #cesiumContainer { width: 100%; height: 100%; }
    
    /* Top Left Unified Menu Header */
    #brand-menu { position: absolute; top: 20px; left: 20px; z-index: 1000; font-family: sans-serif; }
    #brand-logo { color: #fff; background: rgba(0,0,0,0.8); padding: 10px 20px; font-weight: bold; border-radius: 4px; border: 1px solid #3182ce; cursor: pointer; user-select: none; }
    
    /* Dropdown UI Configuration */
    #dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: rgba(0,0,0,0.9); margin-top: 5px; border-radius: 4px; border: 1px solid #4a5568; width: 220px; overflow: hidden; }
    .dropdown-item { color: #fff; padding: 12px 15px; font-size: 14px; text-decoration: none; display: block; cursor: pointer; transition: background 0.2s; }
    .dropdown-item:hover { background: #3182ce; }
    
    /* Integrated Flight Control Panel Layout */
    #controls-panel { display: none; color: #fff; background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 4px; border: 1px solid #718096; margin-top: 5px; width: 220px; font-size: 13px; line-height: 1.5; font-family: sans-serif; }
    #controls-panel h4 { margin: 0 0 8px 0; color: #3182ce; font-size: 14px; }
    
    /* Smoothing Slider Configuration Styling */
    .slider-container { margin-top: 12px; padding-top: 10px; border-top: 1px solid #4a5568; }
    .slider-container label { display: block; font-weight: bold; margin-bottom: 4px; color: #cbd5e0; }
    .slider-ui { width: 100%; cursor: pointer; accent-color: #3182ce; }
    .slider-val { float: right; color: #3182ce; font-family: monospace; }

    #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; z-index: 1000; }

    /* Instrument HUD Layout */
    #horizon-indicator { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 120px; height: 120px; background: #1a202c; border: 3px solid #718096; border-radius: 50%; overflow: hidden; z-index: 1002; }
    #horizon-disc { width: 120px; height: 120px; background: linear-gradient(to bottom, #2b6cb0 50%, #744210 50%); transition: transform 0.05s linear; position: relative; }
    #horizon-degrees { position: absolute; width: 100%; text-align: center; top: 50%; transform: translateY(-50%); color: #fff; font-family: monospace; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; pointer-events: none; }
    
    #alt-indicator { position: absolute; bottom: 30px; left: calc(50% - 160px); width: 80px; height: 40px; background: rgba(0,0,0,0.7); border: 2px solid #718096; color: #0f0; font-family: monospace; text-align: center; font-size: 12px; border-radius: 4px; z-index: 1002; padding-top: 5px; }
    #spd-indicator { position: absolute; bottom: 30px; left: calc(50% + 90px); width: 80px; height: 40px; background: rgba(0,0,0,0.7); border: 2px solid #718096; color: #0f0; font-family: monospace; text-align: center; font-size: 12px; border-radius: 4px; z-index: 1002; padding-top: 5px; }
    
    #pause-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0000; font-family: sans-serif; font-size: 32px; font-weight: bold; background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 8px; border: 2px solid #ff0000; z-index: 2000; pointer-events: none; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="crosshair"></div>
  <div id="pause-overlay">PAUSED</div>
  
  <div id="brand-menu">
    <div id="brand-logo" onclick="toggleDropdown()">GLWFS ▾</div>
    <div id="dropdown-content">
      <div class="dropdown-item" onclick="toggleControlsPanel()">Flight Controls</div>
    </div>
    <div id="controls-panel">
      <h4>Navigation & Control</h4>
      • <b>Mouse</b>: Roll (Left/Right) & Pitch (Up/Down)<br>
      • <b>Scroll Wheel</b>: Camera zoom distance<br>
      • <b>P Key</b>: Pause simulator physics<br>
      
      <div class="slider-container">
        <label for="smoothSlider">Rotation Smoothing <span id="smooth-lbl" class="slider-val">0.50</span></label>
        <input type="range" id="smoothSlider" class="slider-ui" min="0.5" max="1.0" step="0.05" value="0.50" oninput="updateSmoothingFactor(this.value)">
      </div>
    </div>
  </div>
  
  <div id="horizon-indicator">
    <div id="horizon-disc">
      <div id="horizon-degrees">0°</div>
    </div>
  </div>
  <div id="alt-indicator">ALT<br><span id="alt-val">0</span>m</div>
  <div id="spd-indicator">SPD<br><span id="spd-val">0</span>kn</div>

  <script>
    // CLEAN VERIFIED ACCOUNT ACCESS TOKEN STRING SPECIFIED FOR 2026 VALIDATION
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI3YTU3ZjliMy1iNGQxLTQzMTctOWQ3ZS04NTYwOWYwMjM2ZDAiLCJpZCI6NDMzMjcwLCJzdWIiOiJsYXdyZW5jZTIxMzEyIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6Imxhd3JlbmNlMjEzMTJfZGVmYXVsdCIsImlhdCI6MTc4MTc4NDQxOX0.S5ZCBy_DyXDGVyNt_nWg-t084_YzUh72AFPry-7Veuo';
    
    const viewer = new Cesium.Viewer('cesiumContainer', { 
      baseLayerPicker: false, 
      animation: false, 
      timeline: false,
      geocoder: true
    });
    
    viewer.scene.globe.depthTestAgainstTerrain = true;

    Cesium.createOsmBuildingsAsync().then((tileset) => { 
      viewer.scene.primitives.add(tileset); 
    });

    let lon = -74.0445;
    let lat = 40.6892;
    let alt = 200.0; 
    let heading = 0;
    
    let pitch = 0, roll = 0;         
    let targetPitch = 0, targetRoll = 0; 
    let smoothingFactor = 0.50;      
    
    // Smooth camera target state track variables
    let camHeading = 0;
    
    const speed = 0.000025; 
    let camDistance = 40; 
    let isPaused = false;

    const entityConfig = {
      position: new Cesium.CallbackProperty(() => Cesium.Cartesian3.fromDegrees(lon, lat, alt), false),
      orientation: new Cesium.CallbackProperty(() => {
        const center = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
        const hpr = new Cesium.HeadingPitchRoll(
          Cesium.Math.toRadians(heading), 
          Cesium.Math.toRadians(pitch), // Swapped sequence into standard ISO layout structure
          Cesium.Math.toRadians(roll)
        );
        return Cesium.Transforms.headingPitchRollQuaternion(center, hpr);
      }, false)
    };

    let airplane = viewer.entities.add({
      position: entityConfig.position,
      orientation: entityConfig.orientation,
      box: { dimensions: new Cesium.Cartesian3(1.5, 8.0, 1.5), material: Cesium.Color.RED }
    });

    function toggleDropdown() {
      const display = document.getElementById('dropdown-content').style.display;
      document.getElementById('dropdown-content').style.display = (display === 'block') ? 'none' : 'block';
    }

    function toggleControlsPanel() {
      const panel = document.getElementById('controls-panel');
      panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
      document.getElementById('dropdown-content').style.display = 'none';
    }

    function updateSmoothingFactor(val) {
      smoothingFactor = parseFloat(val);
      document.getElementById('smooth-lbl').innerText = smoothingFactor.toFixed(2);
    }

    window.addEventListener('click', function(e) {
      if (!document.getElementById('brand-menu').contains(e.target)) {
        document.getElementById('dropdown-content').style.display = 'none';
      }
    });

    viewer.geocoder.viewModel.complete.addEventListener(() => {
      const camCartographic = viewer.scene.camera.positionCartographic;
      lon = Cesium.Math.toDegrees(camCartographic.longitude);
      lat = Cesium.Math.toDegrees(camCartographic.latitude);
      
      alt = 200.0; 
      heading = 0; 
      camHeading = 0;
      pitch = 0;
      targetPitch = 0;
      roll = 0;
      targetRoll = 0;
    });

    let mouseX = 0, mouseY = 0;
    window.addEventListener('mousemove', (e) => {
      if (isPaused) return;
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = 0 - ((e.clientY / window.innerHeight) * 2 - 1);
    });

    window.addEventListener('wheel', (e) => {
      if (e.deltaY > 0) {
        camDistance += 5; 
      } else {
        camDistance = Math.max(2, camDistance - 5); 
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'p') {
        isPaused = !isPaused;
        document.getElementById('pause-overlay').style.display = isPaused ? 'block' : 'none';
      }
    });

    viewer.clock.onTick.addEventListener(() => {
      if (isPaused) {
        const currentPos = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
        viewer.camera.lookAt(currentPos, new Cesium.HeadingPitchRange(Cesium.Math.toRadians(camHeading), Cesium.Math.toRadians(-15), camDistance));
        return;
      }

      // Uncapped dynamic inputs: Mouse maps directly to rotational targets
      targetPitch = (-mouseY * 85); 
      targetRoll = (-mouseX * 180); // Expanded boundary allows continuous acrobatics
      
      let interpolationWeight = 1.0 - smoothingFactor;
      if (interpolationWeight < 0.01) interpolationWeight = 0.01;

      pitch += (targetPitch - pitch) * interpolationWeight;
      roll += (targetRoll - roll) * interpolationWeight;
      
      // True Aerodynamic Coupling: Roll angle turns you ONLY when pitching/pulling upward
      // We convert values to radians to calculate lift lift vectors accurately
      let pitchRad = Cesium.Math.toRadians(pitch);
      let rollRad = Cesium.Math.toRadians(roll);
      
      if (Math.abs(pitch) > 0.5) {
        // Turning rate maps directly to lift extraction vector: tan(roll) * sin(pitch)
        let turnRate = Math.tan(rollRad) * Math.sin(pitchRad) * 1.2;
        // Limit turn rate speed explosions at steep perpendicular 90 degree clip thresholds
        heading -= Cesium.Math.toDegrees(Math.max(-0.08, Math.min(0.08, turnRate)));
      }
      
      let headingRad = Cesium.Math.toRadians(heading);
      
      // Coordinate trajectory moves along its combined orientation components
      lon += Math.sin(headingRad) * speed * Math.cos(pitchRad);
      lat += Math.cos(headingRad) * speed * Math.cos(pitchRad);
      alt += Math.sin(pitchRad) * (speed * 100000); 

      // Render HUD UI elements
      document.getElementById('horizon-disc').style.transform = `rotate(${roll}deg) translateY(${pitch * 1.5}px)`;
      document.getElementById('horizon-degrees').innerText = `${Math.round(pitch)}°`;
      document.getElementById('alt-val').innerText = Math.round(alt);
      document.getElementById('spd-val').innerText = Math.round(speed * 1200000); 

      // Smooth Camera Follow Pipeline
      camHeading += (heading - camHeading) * interpolationWeight;
      
      const currentPos = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
      viewer.camera.lookAt(currentPos, new Cesium.HeadingPitchRange(Cesium.Math.toRadians(camHeading), Cesium.Math.toRadians(-15), camDistance));
    });
  </script>
</body>
</html>
