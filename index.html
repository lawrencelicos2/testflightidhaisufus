<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>glwfs</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    #cesiumContainer { width: 100%; height: 100%; }
    
    /* Top Left Unified Menu Header */
    #brand-menu { position: absolute; top: 20px; left: 20px; z-index: 1000; font-family: sans-serif; }
    #brand-logo { color: #fff; background: rgba(0,0,0,0.8); padding: 10px 20px; font-weight: bold; border-radius: 4px; border: 1px solid #3182ce; cursor: pointer; user-select: none; }
    
    /* Dropdown UI Configuration */
    #dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: rgba(0,0,0,0.9); margin-top: 5px; border-radius: 4px; border: 1px solid #4a5568; width: 280px; overflow: hidden; }
    .dropdown-item { color: #fff; padding: 12px 15px; font-size: 14px; text-decoration: none; display: block; cursor: pointer; transition: background 0.2s; }
    .dropdown-item:hover { background: #3182ce; }
    
    /* Integrated Flight Control Panel Layout */
    #controls-panel { display: none; color: #fff; background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 4px; border: 1px solid #718096; margin-top: 5px; width: 280px; font-size: 13px; line-height: 1.5; font-family: sans-serif; max-height: 75vh; overflow-y: auto; }
    #controls-panel h4 { margin: 12px 0 6px 0; color: #3182ce; font-size: 14px; border-bottom: 1px solid #4a5568; padding-bottom: 4px; }
    #controls-panel h4:first-of-type { margin-top: 0; }
    
    /* Smoothing Slider Configuration Styling */
    .slider-container { margin-top: 8px; padding-top: 4px; }
    .slider-container label { display: block; font-weight: bold; margin-bottom: 4px; color: #cbd5e0; }
    .slider-row { display: flex; align-items: center; gap: 8px; }
    .slider-ui { flex-grow: 1; cursor: pointer; accent-color: #3182ce; }
    .input-ui { width: 55px; background: #1a202c; border: 1px solid #4a5568; color: #fff; padding: 2px 4px; font-family: monospace; border-radius: 4px; text-align: center; }
    .text-input-ui { width: 100%; background: #1a202c; border: 1px solid #4a5568; color: #fff; padding: 5px; border-radius: 4px; box-sizing: border-box; }

    /* File Import Button UI styling */
    .file-input-wrapper { margin-top: 12px; padding-top: 10px; border-top: 1px solid #4a5568; }
    .file-label { display: block; background: #2b6cb0; color: #fff; text-align: center; padding: 8px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    .file-label:hover { background: #3182ce; }
    #glb-loader { display: none; }

    #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; z-index: 1000; }

    /* Instrument HUD Layout */
    #horizon-indicator { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 120px; height: 120px; background: #1a202c; border: 3px solid #718096; border-radius: 50%; overflow: hidden; z-index: 1002; }
    #horizon-disc { width: 120px; height: 120px; background: linear-gradient(to bottom, #2b6cb0 50%, #744210 50%); transition: transform 0.05s linear; position: relative; }
    #horizon-degrees { position: absolute; width: 100%; text-align: center; top: 50%; transform: translateY(-50%); color: #fff; font-family: monospace; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; pointer-events: none; }
    
    #alt-indicator { position: absolute; bottom: 30px; left: calc(50% - 160px); width: 80px; height: 40px; background: rgba(0,0,0,0.7); border: 2px solid #718096; color: #0f0; font-family: monospace; text-align: center; font-size: 12px; border-radius: 4px; z-index: 1002; padding-top: 5px; }
    #spd-indicator { position: absolute; bottom: 30px; left: calc(50% + 90px); width: 80px; height: 40px; background: rgba(0,0,0,0.7); border: 2px solid #718096; color: #0f0; font-family: monospace; text-align: center; font-size: 12px; border-radius: 4px; z-index: 1002; padding-top: 5px; }
    
    #pause-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0000; font-family: sans-serif; font-size: 32px; font-weight: bold; background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 8px; border: 2px solid #ff0000; z-index: 2000; pointer-events: none; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="crosshair"></div>
  <div id="pause-overlay">PAUSED</div>
  
  <div id="brand-menu">
    <div id="brand-logo" onclick="toggleDropdown()">GLWFS ▾</div>
    <div id="dropdown-content">
      <div class="dropdown-item" onclick="toggleControlsPanel()">Flight Controls & Mesh</div>
    </div>
    <div id="controls-panel">
      <h4>Navigation & Control</h4>
      • <b>Mouse</b>: Pitch & Roll dynamics<br>
      • <b>Scroll Wheel</b>: Camera zoom distance<br>
      • <b>P Key</b>: Pause simulator physics<br>
      
      <div class="slider-container" style="border-top: 1px solid #4a5568; padding-top: 8px;">
        <label>Rotation Smoothing</label>
        <div class="slider-row">
          <input type="range" id="smoothSlider" class="slider-ui" min="0.5" max="1.0" step="0.05" value="0.50" oninput="syncControl('smooth', this.value)">
          <input type="text" id="smoothInput" class="input-ui" value="0.50" onchange="syncControl('smooth', this.value)">
        </div>
      </div>

      <div class="file-input-wrapper">
        <label for="glb-loader" class="file-label">Load Plane GLB</label>
        <input type="file" id="glb-loader" accept=".glb" onchange="handleGLBLoad(event)">
      </div>

      <h4>Component Node Identifiers</h4>
      <div class="slider-container">
        <label>Propeller Part Name (e.g., prop)</label>
        <input type="text" id="propNodeInput" class="text-input-ui" placeholder="Enter mesh node ID..." onchange="updateSubNodes()">
      </div>
      <div class="slider-container">
        <label>Flaps/Control Surfaces Name</label>
        <input type="text" id="flapNodeInput" class="text-input-ui" placeholder="Enter mesh node ID..." onchange="updateSubNodes()">
      </div>

      <h4>Model Visual Scale & Pos Offsets</h4>
      <div class="slider-container">
        <label>Size Multiplier</label>
        <div class="slider-row">
          <input type="range" id="scaleSlider" class="slider-ui" min="1" max="100" value="1" oninput="syncControl('scale', this.value)">
          <input type="text" id="scaleInput" class="input-ui" value="1" onchange="syncControl('scale', this.value)">
        </div>
      </div>
      <div class="slider-container">
        <label>Offset Longitude (X)</label>
        <div class="slider-row">
          <input type="range" id="offsetXSlider" class="slider-ui" min="-100" max="100" value="0" oninput="syncControl('offsetX', this.value)">
          <input type="text" id="offsetXInput" class="input-ui" value="0" onchange="syncControl('offsetX', this.value)">
        </div>
      </div>
      <div class="slider-container">
        <label>Offset Latitude (Y)</label>
        <div class="slider-row">
          <input type="range" id="offsetYSlider" class="slider-ui" min="-100" max="100" value="0" oninput="syncControl('offsetY', this.value)">
          <input type="text" id="offsetYInput" class="input-ui" value="0" onchange="syncControl('offsetY', this.value)">
        </div>
      </div>
      <div class="slider-container">
        <label>Offset Altitude (Z)</label>
        <div class="slider-row">
          <input type="range" id="offsetZSlider" class="slider-ui" min="-100" max="100" value="0" oninput="syncControl('offsetZ', this.value)">
          <input type="text" id="offsetZInput" class="input-ui" value="0" onchange="syncControl('offsetZ', this.value)">
        </div>
      </div>

      <h4>Model Axis Rot Offsets (Deg)</h4>
      <div class="slider-container">
        <label>Heading Offset</label>
        <div class="slider-row">
          <input type="range" id="offsetHSlider" class="slider-ui" min="0" max="360" value="0" oninput="syncControl('offsetH', this.value)">
          <input type="text" id="offsetHInput" class="input-ui" value="0" onchange="syncControl('offsetH', this.value)">
        </div>
      </div>
      <div class="slider-container">
        <label>Pitch Offset</label>
        <div class="slider-row">
          <input type="range" id="offsetPSlider" class="slider-ui" min="0" max="360" value="0" oninput="syncControl('offsetP', this.value)">
          <input type="text" id="offsetPInput" class="input-ui" value="0" onchange="syncControl('offsetP', this.value)">
        </div>
      </div>
      <div class="slider-container">
        <label>Roll Offset</label>
        <div class="slider-row">
          <input type="range" id="offsetRSlider" class="slider-ui" min="0" max="360" value="0" oninput="syncControl('offsetR', this.value)">
          <input type="text" id="offsetRInput" class="input-ui" value="0" onchange="syncControl('offsetR', this.value)">
        </div>
      </div>
    </div>
  </div>
  
  <div id="horizon-indicator">
    <div id="horizon-disc">
      <div id="horizon-degrees">0°</div>
    </div>
  </div>
  <div id="alt-indicator">ALT<br><span id="alt-val">0</span>m</div>
  <div id="spd-indicator">SPD<br><span id="spd-val">0</span>kn</div>

  <script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI3YTU3ZjliMy1iNGQxLTQzMTctOWQ3ZS04NTYwOWYwMjM2ZDAiLCJpZCI6NDMzMjcwLCJzdWIiOiJsYXvyZW5jZTIxMzEyIiwiaXNzIjoiaHR0cHM6Lyapi5jZXNpdW0uY29tIiwiYXVkIjoibGF3cmVuY2UyMTMxMl9kZWZhdWx0IiwiaWF0IjoxNzgxNzg0NDE5fQ.S5ZCBy_DyXDGVyNt_nWg-t084_YzUh72AFPry-7Veuo';
    
    const viewer = new Cesium.Viewer('cesiumContainer', { 
      baseLayerPicker: false, 
      animation: false, 
      timeline: false,
      geocoder: true,
      baseLayer: Cesium.ImageryLayer.fromProviderAsync(Cesium.ArcGisMapServerImageryProvider.fromUrl('https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'))
    });
    
    viewer.scene.globe.depthTestAgainstTerrain = true;

    Cesium.createOsmBuildingsAsync().then((tileset) => { 
      viewer.scene.primitives.add(tileset); 
    });

    let lon = -74.0445;
    let lat = 40.6892;
    let alt = 200.0; 
    let heading = 0;
    
    let pitch = 0, roll = 0;         
    let targetPitch = 0, targetRoll = 0; 
    let smoothingFactor = 0.50;      
    
    let modelOffsetH = 0, modelOffsetP = 0, modelOffsetR = 0;
    let modelOffsetX = 0, modelOffsetY = 0, modelOffsetZ = 0;
    let modelScale = 1.0;
    
    let propNodeName = "";
    let flapNodeName = "";
    let propRotationAngle = 0;

    let camHeading = 0;
    const speed = 0.000025; 
    let camDistance = 40; 
    let isPaused = false;
    let loadedBlobURL = null;

    // Conversion values for translating local meter offsets to degrees safely
    const latConversion = 111320;
    const positionProperty = new Cesium.CallbackProperty(() => {
      const lonOffset = modelOffsetX / (latConversion * Math.cos(Cesium.Math.toRadians(lat)));
      const latOffset = modelOffsetY / latConversion;
      return Cesium.Cartesian3.fromDegrees(lon + lonOffset, lat + latOffset, alt + modelOffsetZ);
    }, false);

    const orientationProperty = new Cesium.CallbackProperty(() => {
      const center = positionProperty.getValue(viewer.clock.currentTime);
      const hpr = new Cesium.HeadingPitchRoll(
        Cesium.Math.toRadians(heading + modelOffsetH), 
        Cesium.Math.toRadians(roll + modelOffsetR), 
        Cesium.Math.toRadians(pitch + modelOffsetP)
      );
      return Cesium.Transforms.headingPitchRollQuaternion(center, hpr);
    }, false);

    let airplane = viewer.entities.add({
      position: positionProperty,
      orientation: orientationProperty,
      box: { dimensions: new Cesium.Cartesian3(1.5, 8.0, 1.5), material: Cesium.Color.RED }
    });

    function handleGLBLoad(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const arrayBuffer = e.target.result;
        const blob = new Blob([arrayBuffer], { type: "model/gltf-binary" });
        if (loadedBlobURL) URL.revokeObjectURL(loadedBlobURL);
        loadedBlobURL = URL.createObjectURL(blob);

        viewer.entities.remove(airplane);

        airplane = viewer.entities.add({
          position: positionProperty,
          orientation: orientationProperty,
          model: {
            uri: loadedBlobURL,
            minimumPixelSize: 64,
            scale: new Cesium.CallbackProperty(() => modelScale, false),
            runAnimations: false // Disable built-ins so our custom node adjustments handle everything
          }
        });
        updateSubNodes();
      };
      reader.readAsArrayBuffer(file);
    }

    function updateSubNodes() {
      propNodeName = document.getElementById('propNodeInput').value.trim();
      flapNodeName = document.getElementById('flapNodeInput').value.trim();
    }

    function syncControl(type, val) {
      const numVal = parseFloat(val);
      if (isNaN(numVal)) return;

      if (type === 'smooth') {
        smoothingFactor = Math.max(0.5, Math.min(1.0, numVal));
        document.getElementById('smoothSlider').value = smoothingFactor;
        document.getElementById('smoothInput').value = smoothingFactor.toFixed(2);
      } else if (type === 'scale') {
        modelScale = Math.max(1, numVal);
        document.getElementById('scaleSlider').value = modelScale;
        document.getElementById('scaleInput').value = modelScale;
      } else if (type === 'offsetX') {
        modelOffsetX = numVal; document.getElementById('offsetXSlider').value = numVal; document.getElementById('offsetXInput').value = numVal;
      } else if (type === 'offsetY') {
        modelOffsetY = numVal; document.getElementById('offsetYSlider').value = numVal; document.getElementById('offsetYInput').value = numVal;
      } else if (type === 'offsetZ') {
        modelOffsetZ = numVal; document.getElementById('offsetZSlider').value = numVal; document.getElementById('offsetZInput').value = numVal;
      } else if (type === 'offsetH') {
        modelOffsetH = numVal; document.getElementById('offsetHSlider').value = numVal; document.getElementById('offsetHInput').value = numVal;
      } else if (type === 'offsetP') {
        modelOffsetP = numVal; document.getElementById('offsetPSlider').value = numVal; document.getElementById('offsetPInput').value = numVal;
      } else if (type === 'offsetR') {
        modelOffsetR = numVal; document.getElementById('offsetRSlider').value = numVal; document.getElementById('offsetRInput').value = numVal;
      }
    }

    function toggleDropdown() {
      const display = document.getElementById('dropdown-content').style.display;
      document.getElementById('dropdown-content').style.display = (display === 'block') ? 'none' : 'block';
    }

    function toggleControlsPanel() {
      const panel = document.getElementById('controls-panel');
      panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
      document.getElementById('dropdown-content').style.display = 'none';
    }

    window.addEventListener('click', function(e) {
      if (!document.getElementById('brand-menu').contains(e.target)) {
        document.getElementById('dropdown-content').style.display = 'none';
      }
    });

    viewer.geocoder.viewModel.complete.addEventListener(() => {
      const camCartographic = viewer.scene.camera.positionCartographic;
      lon = Cesium.Math.toDegrees(camCartographic.longitude);
      lat = Cesium.Math.toDegrees(camCartographic.latitude);
      alt = 200.0; heading = 0; camHeading = 0; pitch = 0; targetPitch = 0; roll = 0; targetRoll = 0;
    });

    let mouseX = 0, mouseY = 0;
    window.addEventListener('mousemove', (e) => {
      if (isPaused) return;
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = 0 - ((e.clientY / window.innerHeight) * 2 - 1);
    });

    window.addEventListener('wheel', (e) => {
      if (e.deltaY > 0) camDistance += 5; else camDistance = Math.max(2, camDistance - 5);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'p') {
        isPaused = !isPaused;
        document.getElementById('pause-overlay').style.display = isPaused ? 'block' : 'none';
      }
    });

    viewer.clock.onTick.addEventListener(() => {
      if (isPaused) {
        const currentPos = positionProperty.getValue(viewer.clock.currentTime);
        viewer.camera.lookAt(currentPos, new Cesium.HeadingPitchRange(Cesium.Math.toRadians(camHeading), Cesium.Math.toRadians(-15), camDistance));
        return;
      }

      targetPitch = (-mouseY * 45); 
      targetRoll = (-mouseX * 45);  
      
      let interpolationWeight = 1.0 - smoothingFactor;
      if (interpolationWeight < 0.01) interpolationWeight = 0.01;

      pitch += (targetPitch - pitch) * interpolationWeight;
      roll += (targetRoll - roll) * interpolationWeight;
      heading -= (roll * 0.05);
      
      const pitchRad = Cesium.Math.toRadians(pitch);
      const headingRad = Cesium.Math.toRadians(heading);
      
      lon += Math.sin(headingRad) * speed * Math.cos(pitchRad);
      lat += Math.cos(headingRad) * speed * Math.cos(pitchRad);
      alt += Math.sin(pitchRad) * (speed * 100000); 

      // Render custom node rotations if airplane mesh is loaded up
      if (airplane && airplane.model) {
        // Continuous rotation matrix transformation for the spinning propeller feature
        propRotationAngle += 0.5;
        if (propRotationAngle > Math.PI * 2) propRotationAngle -= Math.PI * 2;

        if (propNodeName !== "") {
          viewer.scene.primitives.add(new Cesium.ModelNodeTransform({
            nodeName: propNodeName,
            transformation: Cesium.Matrix4.fromRotationTranslation(Cesium.Matrix3.fromRotationY(propRotationAngle))
          }));
        }
        // Dynamic pitch rotation mapping to drive your custom flapping surfaces
        if (flapNodeName !== "") {
          viewer.scene.primitives.add(new Cesium.ModelNodeTransform({
            nodeName: flapNodeName,
            transformation: Cesium.Matrix4.fromRotationTranslation(Cesium.Matrix3.fromRotationX(Cesium.Math.toRadians(pitch * 0.5)))
          }));
        }
      }

      document.getElementById('horizon-disc').style.transform = `rotate(${roll}deg) translateY(${pitch * 1.5}px)`;
      document.getElementById('horizon-degrees').innerText = `${Math.round(pitch)}°`;
      document.getElementById('alt-val').innerText = Math.round(alt);
      document.getElementById('spd-val').innerText = Math.round(speed * 1200000); 

      let camSpeedMultiplier = interpolationWeight * 2.5; 
      if (camSpeedMultiplier > 1.0) camSpeedMultiplier = 1.0;
      camHeading += (heading - camHeading) * camSpeedMultiplier;

      const currentPos = positionProperty.getValue(viewer.clock.currentTime);
      viewer.camera.lookAt(currentPos, new Cesium.HeadingPitchRange(Cesium.Math.toRadians(camHeading), Cesium.Math.toRadians(-15), camDistance));
    });
  </script>
</body>
</html>
