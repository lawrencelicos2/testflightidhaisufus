<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>GLWFS - DEBUG VIEW (Cartesian)</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    #cesiumContainer { width: 100%; height: 100%; }
    #debug-ui {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.7); color: #0f0;
      padding: 15px; font-family: monospace;
      pointer-events: none; z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="debug-ui">
    <div>PLANE (Cartesian): <span id="plane-pos">Loading...</span></div>
    <div>CAMERA (Cartesian): <span id="cam-pos">Loading...</span></div>
  </div>

  <script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1YWMyNTk2MC0yNDhhLTQyMTQtYmM3My1jYzBlMDJlN2FjN2EiLCJpZCI6NDMzMjcwLCJzdWIiOiJsYXdyZW5jZTIxMzEyIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6Imxhd3JlbmNlMjEzMTJfZGVmYXVsdCIsImlhdCI6MTc4MTc3NjEyNH0.-Xv456V3XvbRuZNtd-5-LdWzeTZctKKFcsE6v_b6TXg';
    
    // Initializing with 'false' removes the extra UI widgets
    const viewer = new Cesium.Viewer('cesiumContainer', {
      timeline: false,
      animation: false,
      navigationInstructionsInitiallyVisible: false,
      navigationHelpButton: false,
      geocoder: false,
      sceneModePicker: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      vrButton: false
    });
    
    const planePos = new Cesium.Cartesian3(1335340.0, -4654600.0, 4138000.0);
    
    const airplane = viewer.entities.add({
      position: planePos,
      box: {
        dimensions: new Cesium.Cartesian3(20.0, 20.0, 20.0),
        material: Cesium.Color.RED
      }
    });

    const planeUI = document.getElementById('plane-pos');
    const camUI = document.getElementById('cam-pos');

    viewer.clock.onTick.addEventListener(() => {
      viewer.camera.lookAt(planePos, new Cesium.HeadingPitchRange(0, -0.5, 500));
      
      const c = viewer.camera.position;
      planeUI.innerText = `X: ${planePos.x.toFixed(0)}, Y: ${planePos.y.toFixed(0)}, Z: ${planePos.z.toFixed(0)}`;
      camUI.innerText = `X: ${c.x.toFixed(0)}, Y: ${c.y.toFixed(0)}, Z: ${c.z.toFixed(0)}`;
    });
  </script>
</body>
</html>
