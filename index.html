<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.121/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <script>
        // REPLACE 'YOUR_TOKEN_HERE' WITH YOUR ACTUAL ACCESS TOKEN
        Cesium.Ion.defaultAccessToken = 'YOUR_TOKEN_HERE';

        const viewer = new Cesium.Viewer('cesiumContainer', {
            // These settings ensure maximum compatibility on web browsers
            terrainProvider: Cesium.createWorldTerrain(),
            baseLayerPicker: false,
            geocoder: false,
            animation: false,
            timeline: false
        });
    </script>
</body>
</html>
