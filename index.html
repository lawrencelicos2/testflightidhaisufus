<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>glwfs</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    #cesiumContainer { width: 100%; height: 100%; }
    #brand-logo { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.6); padding: 10px 20px; font-family: sans-serif; font-weight: bold; z-index: 1000; border-radius: 4px; }
    #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; z-index: 1000; }
    #horizon-indicator { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 120px; height: 120px; background: #1a202c; border: 3px solid #718096; border-radius: 50%; overflow: hidden; z-index: 1002; }
    #horizon-disc { width: 120px; height: 120px; background: linear-gradient(to bottom, #2b6cb0 50%, #744210 50%); transition: transform 0.05s linear; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="brand-logo">GLWFS</div>
  <div id="crosshair"></div>
  <div id="horizon-indicator"><div id="horizon-disc"></div></div>

  <script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1YWMyNTk2MC0yNDhhLTQyMTQtYmM3My1jYzBlMDJlN2FjN2EiLCJpZCI6NDMzMjcwLCJzdWIiOiJsYXdyZW5jZTIxMzEyIiwiaXNzIjoiaHR0cHM6Ly9hcGkuY2VzaXVtLmNvbSIsImF1ZCI6Imxhd3JlbmNlMjEzMTJfZGVmYXVsdCIsImlhdCI6MTc4MTc3NjEyNH0.-Xv456V3XvbRuZNtd-5-LdWzeTZctKKFcsE6v_b6TXg';
    const viewer = new Cesium.Viewer('cesiumContainer', { baseLayerPicker: false, animation: false, timeline: false });
    
    Cesium.createOsmBuildingsAsync().then((tileset) => { 
      tileset.maximumScreenSpaceError = 32; 
      viewer.scene.primitives.add(tileset); 
    });

    let position = Cesium.Cartesian3.fromDegrees(-74.0120, 40.7050, 300.0);
    
    // Degrees tracking
    let headingDeg = 0;
    let pitchDeg = 0;
    let rollDeg = 0;
    
    const speed = 10.0; 

    const airplane = viewer.entities.add({
      position: new Cesium.CallbackProperty(() => position, false),
      orientation: new Cesium.CallbackProperty(() => {
        const hpr = new Cesium.HeadingPitchRoll(
          Cesium.Math.toRadians(headingDeg), 
          Cesium.Math.toRadians(pitchDeg), 
          Cesium.Math.toRadians(rollDeg)
        );
        return Cesium.Transforms.headingPitchRollQuaternion(position, hpr);
      }, false),
      box: { dimensions: new Cesium.Cartesian3(10, 10, 10), material: Cesium.Color.RED }
    });

    let mouseX = 0, mouseY = 0;
    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = 0 - ((e.clientY / window.innerHeight) * 2 - 1);
    });

    viewer.clock.onTick.addEventListener(() => {
      // Uncapped raw accumulation
      pitchDeg += (mouseY * 1.5); 
      rollDeg += (mouseX * 2.0);  
      headingDeg += (mouseX * 1.0);

      // Convert current positions directly to radians for the directional vectors
      const rHeading = Cesium.Math.toRadians(headingDeg);
      const rPitch = Cesium.Math.toRadians(pitchDeg);
      const rRoll = Cesium.Math.toRadians(rollDeg);

      // Direct 3D Forward vector movement calculation
      const hpr = new Cesium.HeadingPitchRoll(rHeading, rPitch, rRoll);
      const orientationMatrix = Cesium.Transforms.headingPitchRollToFixedFrame(position, hpr);
      
      const localForward = new Cesium.Cartesian3(0, 1, 0); 
      const worldForward = Cesium.Matrix4.multiplyByPointAsVector(orientationMatrix, localForward, new Cesium.Cartesian3());
      Cesium.Cartesian3.normalize(worldForward, worldForward);

      const movement = Cesium.Cartesian3.multiplyByScalar(worldForward, speed, new Cesium.Cartesian3());
      Cesium.Cartesian3.add(position, movement, position);

      // HUD tracking sync
      document.getElementById('horizon-disc').style.transform = `rotate(${rollDeg}deg) translateY(${pitchDeg * 1.5}px)`;
      
      // Smooth camera implementation relative to global frame tracking
      viewer.camera.lookAt(position, new Cesium.HeadingPitchRange(rHeading, Cesium.Math.toRadians(-15), 500));
    });
  </script>
</body>
</html>
